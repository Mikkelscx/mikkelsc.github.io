<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNGE MOD UV - Mikkel Skrøder-Christensen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* UNGE MOD UV Theme - Black and Neon Light Blue */
        .unge-mod-uv-page {
            background: linear-gradient(135deg, #000000 0%, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%, #000000 100%);
            min-height: 100vh;
            color: #00ffff;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .unge-mod-uv-page::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(0, 255, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 40%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(0, 255, 255, 0.12) 0%, transparent 50%);
            animation: neonPulse 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes neonPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .unge-mod-uv-content {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 3rem;
            margin: 2rem auto;
            max-width: 1200px;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.3),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            overflow: visible;
        }

        .unge-mod-uv-content h1 {
            color: #00ffff;
            text-align: center;
            font-size: 3.5rem;
            margin-bottom: 2rem;
            text-shadow: 
                0 0 15px #00ffff,
                0 0 25px #00ffff,
                0 0 35px #00ffff,
                0 0 45px #00ffff;
            font-weight: bold;
            letter-spacing: 3px;
            animation: neonGlow 2s ease-in-out infinite alternate;
        }

        @keyframes neonGlow {
            from { text-shadow: 0 0 15px #00ffff, 0 0 25px #00ffff, 0 0 35px #00ffff, 0 0 45px #00ffff; }
            to { text-shadow: 0 0 20px #00ffff, 0 0 30px #00ffff, 0 0 40px #00ffff, 0 0 50px #00ffff, 0 0 60px #00ffff; }
        }

        .neon-text {
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff;
            font-weight: 500;
        }

        .neon-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            box-shadow: 
                0 0 10px rgba(0, 255, 255, 0.2),
                inset 0 0 10px rgba(0, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .neon-box:hover {
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.4),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .neon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .neon-card {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 20, 40, 0.6));
            border: 1px solid #00ffff;
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .neon-card:hover {
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            transform: scale(1.02);
        }

        .neon-card h3 {
            color: #00ffff;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }

        .neon-card p {
            color: #b0e0e6;
            line-height: 1.6;
        }

        .neon-button {
            background: linear-gradient(135deg, #00ffff, #0080ff);
            color: #000;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .neon-button:hover {
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        .neon-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .neon-stat {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .neon-stat h4 {
            color: #00ffff;
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
            text-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff;
        }

        .neon-stat p {
            color: #b0e0e6;
            margin: 0;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .neon-line {
            height: 3px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            margin: 2rem 0;
            box-shadow: 0 0 15px #00ffff, 0 0 25px #00ffff;
        }

        /* Navigation styling for this theme */
        .unge-mod-uv-page .navbar {
            background: rgba(0, 0, 0, 0.9) !important;
            border-bottom: 2px solid #00ffff !important;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3) !important;
        }

        .unge-mod-uv-page .nav-link {
            color: #00ffff !important;
            text-shadow: 0 0 5px #00ffff !important;
        }

        .unge-mod-uv-page .nav-link:hover {
            color: #ffffff !important;
            text-shadow: 0 0 10px #ffffff !important;
        }

        .unge-mod-uv-page .back-button {
            background: linear-gradient(135deg, #00ffff, #0080ff) !important;
            color: #000 !important;
            border: 2px solid #00ffff !important;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3) !important;
        }

        .unge-mod-uv-page .back-button:hover {
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6) !important;
            transform: translateY(-2px) !important;
        }

        /* Title Slide Presentation Styles */
        .title-slide {
            background: linear-gradient(135deg, #000080, #0000a0);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 3rem;
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.4),
                inset 0 0 30px rgba(0, 255, 255, 0.1);
            position: relative;
        }

        .neon-border-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 20px;
        }

        .neon-line-thin {
            height: 1px;
            background: #00ffff;
            box-shadow: 0 0 10px #00ffff;
            margin-bottom: 5px;
        }

        .neon-line-thick {
            height: 3px;
            background: #00ffff;
            box-shadow: 0 0 15px #00ffff, 0 0 25px #00ffff;
        }

        .neon-border-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
        }

        .title-content {
            text-align: center;
            margin: 4rem 0;
        }

        .project-title {
            color: #ffffff;
            font-size: 4rem;
            font-weight: bold;
            margin: 0 0 1rem 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            letter-spacing: 4px;
        }

        .project-subtitle {
            color: #ffffff;
            font-size: 1.5rem;
            font-style: italic;
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
        }

        .project-info {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0;
            margin-top: 3rem;
            border-top: 3px solid #00ffff;
            box-shadow: 0 0 15px #00ffff, 0 0 25px #00ffff;
        }

        .info-panel {
            padding: 1.5rem;
            text-align: center;
            position: relative;
        }

        .info-panel:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: #00ffff;
            box-shadow: 0 0 10px #00ffff;
        }

        .info-panel span {
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.6);
        }

        .left-panel {
            text-align: left;
        }

        .center-panel {
            text-align: center;
        }

        .right-panel {
            text-align: right;
        }

        .presentation-section {
            text-align: center;
            margin: 2rem 0;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .presentation-section h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .presentation-section p {
            font-size: 1.2rem;
            margin: 0;
        }

        /* Campaign Section Styles */
        .campaign-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin: 2rem 0;
            align-items: start;
        }

        .split-image-container {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .split-image {
            display: flex;
            height: 400px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .image-half {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .left-half {
            background: linear-gradient(135deg, #4a90e2, #357abd);
            border-right: 2px solid #00ffff;
        }

        .right-half {
            background: linear-gradient(135deg, #8b4513, #654321);
        }

        .image-label {
            color: #ffffff;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            margin-bottom: 0.5rem;
        }

        .person-info {
            color: #ffffff;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .healthy-side {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #ffd700, #ffb347);
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .damaged-side {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #8b4513, #654321);
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: 0 0 20px rgba(139, 69, 19, 0.6);
            position: relative;
        }

        .damaged-side::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, #654321, #8b4513);
            border-radius: 50%;
            opacity: 0.8;
        }

        .quote {
            color: #ffffff;
            font-style: italic;
            font-size: 1rem;
            text-align: center;
            margin-top: 1rem;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .campaign-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .campaign-info h2 {
            color: #00ffff;
            font-size: 1.8rem;
            text-shadow: 0 0 15px #00ffff, 0 0 25px #00ffff;
            margin-bottom: 1rem;
        }

        .statistic-box {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .statistic-box p {
            color: #ffffff;
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0;
        }

        .highlight {
            color: #00ffff;
            font-weight: bold;
            font-size: 1.3rem;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }

        .call-to-action {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 1rem;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .call-to-action p {
            color: #ffffff;
            margin: 0;
            font-size: 0.9rem;
        }

        .neon-link {
            color: #00ffff;
            text-decoration: none;
            text-shadow: 0 0 5px #00ffff;
            transition: all 0.3s ease;
        }

        .neon-link:hover {
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }

        .message-list {
            display: grid;
            gap: 1rem;
        }

        .message-item {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 1rem;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .message-item h4 {
            color: #00ffff;
            margin: 0 0 0.5rem 0;
            text-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff;
        }

        .message-item p {
            color: #b0e0e6;
            margin: 0;
            line-height: 1.5;
        }

        /* Floating neon particles */
        .neon-particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 5px #00ffff;
            animation: floatParticle 6s infinite linear;
            z-index: 2;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(100px);
                opacity: 0;
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .campaign-section {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            
            .split-image {
                height: 300px;
            }
            
            .healthy-side, .damaged-side {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>

        <!-- Page Content -->
    <div class="unge-mod-uv-content">
        <h1 class="neon-text" style="text-align: center; font-size: 3.5rem; margin-bottom: 2rem; text-shadow: 0 0 5px #00ffff, 0 2px 8px #00ffff;">UNGE MOD UV</h1>
        
        <h4 style="text-align: center; margin-bottom: 0.2rem; font-size: 1.2rem; color: #00ffff;">BRIEF</h4>
        <p style="text-align: center; margin: 0.2rem auto; font-size: 1.2rem; color: #00ffff;">Få unge mennesker til at stoppe med at gå i solarium</p>
        
        <h4 style="text-align: center; margin: 2rem 0 0.2rem 0; font-size: 1.2rem; color: #00ffff;">ACTIVATION</h4>
    </div>

    <script>
        // Create floating neon particles
        function createNeonParticle() {
            const particle = document.createElement('div');
            particle.className = 'neon-particle';
            
            // Random starting position
            const startX = Math.random() * window.innerWidth;
            particle.style.left = `${startX}px`;
            
            // Random animation duration
            const duration = 4 + Math.random() * 4;
            particle.style.animationDuration = `${duration}s`;
            
            document.body.appendChild(particle);
            
            // Remove after animation
            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }

        // Create particles periodically
        setInterval(createNeonParticle, 2000);
        
        // Create initial particles
        setTimeout(() => {
            for (let i = 0; i < 10; i++) {
                setTimeout(createNeonParticle, i * 300);
            }
        }, 1000);

        // Add hover effects to neon cards
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.neon-card');
            cards.forEach(card => {
                card.addEventListener('mouseenter', function() {
                    this.style.transform = 'scale(1.05) translateY(-5px)';
                });
                
                card.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1) translateY(0)';
                });
            });
        });
    </script>
